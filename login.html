<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Novus Foods KB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#0f1117]">

  <div class="w-full max-w-md px-6">

    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-emerald-600 to-teal-700
        flex items-center justify-center mx-auto mb-4 shadow-xl shadow-emerald-900/40">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13
               C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13
               C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13
               C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Novus Foods</h1>
      <p class="text-slate-500 text-sm mt-1">Plant 1730 · Knowledge Base</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
      <h2 class="text-lg font-semibold text-white mb-6">Sign in to your account</h2>

      <div id="error-msg" class="hidden mb-4 px-4 py-3 bg-red-900/40 border border-red-700/50
        rounded-xl text-red-300 text-sm"></div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1.5">Email address</label>
          <input type="email" id="email" autocomplete="email"
            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3
              text-slate-200 text-sm placeholder-slate-600
              focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/30
              transition-colors"
            placeholder="you@novusfoods.com"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1.5">Password</label>
          <input type="password" id="password" autocomplete="current-password"
            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3
              text-slate-200 text-sm placeholder-slate-600
              focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/30
              transition-colors"
            placeholder="••••••••"/>
        </div>
        <button id="login-btn"
          class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold
            py-3 rounded-xl transition-colors text-sm flex items-center justify-center gap-2
            disabled:opacity-50 disabled:cursor-not-allowed mt-2">
          <span id="btn-text">Sign In</span>
          <svg id="btn-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
        </button>
      </div>
    </div>

    <p class="text-center text-slate-700 text-xs mt-6">
      Novus Foods Plant 1730 · Buena Park, CA
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/rbac.js"></script>
  <script>
    // Redirect if already logged in
    Auth.redirectIfLoggedIn();

    const btn      = document.getElementById('login-btn');
    const errBox   = document.getElementById('error-msg');
    const spinner  = document.getElementById('btn-spinner');
    const btnText  = document.getElementById('btn-text');

    function setLoading(loading) {
      btn.disabled = loading;
      spinner.classList.toggle('hidden', !loading);
      btnText.textContent = loading ? 'Signing in…' : 'Sign In';
    }

    function showError(msg) {
      errBox.textContent = msg;
      errBox.classList.remove('hidden');
    }

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) { showError('Please enter your email and password.'); return; }

      errBox.classList.add('hidden');
      setLoading(true);

      try {
        await Auth.login(email, password);
        window.location.replace('index.html');
      } catch (err) {
        showError(err.message || 'Login failed. Please check your credentials.');
        setLoading(false);
      }
    }

    btn.addEventListener('click', handleLogin);

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
